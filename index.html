<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4a90d9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="成绩记录">
    <title>小学生成绩记录</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 小学生成绩记录</h1>
            <p class="subtitle">上海小学 · 语文 · 数学 · 英语</p>
        </header>

        <!-- 学生选择/管理 -->
        <section class="student-section">
            <div class="student-selector">
                <label>当前学生：</label>
                <select id="studentSelect">
                    <option value="">请选择学生</option>
                </select>
                <button id="addStudentBtn" class="btn btn-primary">+ 添加学生</button>
                <button id="deleteStudentBtn" class="btn btn-danger" style="display:none;">删除学生</button>
            </div>
        </section>

        <!-- 添加学生弹窗 -->
        <div id="studentModal" class="modal">
            <div class="modal-content">
                <h3>添加新学生</h3>
                <input type="text" id="studentName" placeholder="学生姓名" maxlength="20">
                <select id="studentGrade">
                    <option value="1">一年级</option>
                    <option value="2">二年级</option>
                    <option value="3">三年级</option>
                    <option value="4">四年级</option>
                    <option value="5">五年级</option>
                </select>
                <div class="avatar-section">
                    <label>选择头像</label>
                    <div class="avatar-options" id="avatarOptions">
                        <div class="avatar-option selected" data-avatar="girl1">
                            <svg viewBox="0 0 100 100"><circle cx="50" cy="40" r="25" fill="#FFE4C4"/><circle cx="50" cy="100" r="40" fill="#FF69B4"/><path d="M25 30 Q50 0 75 30 Q80 45 75 50 Q50 35 25 50 Q20 45 25 30" fill="#4A3728"/><circle cx="42" cy="38" r="3" fill="#333"/><circle cx="58" cy="38" r="3" fill="#333"/><path d="M45 48 Q50 52 55 48" stroke="#333" fill="none" stroke-width="2"/><circle cx="35" cy="42" r="4" fill="#FFB6C1" opacity="0.5"/><circle cx="65" cy="42" r="4" fill="#FFB6C1" opacity="0.5"/></svg>
                        </div>
                        <div class="avatar-option" data-avatar="girl2">
                            <svg viewBox="0 0 100 100"><circle cx="50" cy="40" r="25" fill="#FFE4C4"/><circle cx="50" cy="100" r="40" fill="#9370DB"/><ellipse cx="50" cy="25" rx="30" ry="20" fill="#2C1810"/><ellipse cx="25" cy="45" rx="8" ry="15" fill="#2C1810"/><ellipse cx="75" cy="45" rx="8" ry="15" fill="#2C1810"/><circle cx="42" cy="38" r="3" fill="#333"/><circle cx="58" cy="38" r="3" fill="#333"/><path d="M45 48 Q50 52 55 48" stroke="#333" fill="none" stroke-width="2"/></svg>
                        </div>
                        <div class="avatar-option" data-avatar="girl3">
                            <svg viewBox="0 0 100 100"><circle cx="50" cy="40" r="25" fill="#FFE4C4"/><circle cx="50" cy="100" r="40" fill="#20B2AA"/><path d="M20 35 Q50 5 80 35 L75 55 Q50 45 25 55 Z" fill="#FF6347"/><circle cx="42" cy="38" r="3" fill="#333"/><circle cx="58" cy="38" r="3" fill="#333"/><path d="M45 48 Q50 52 55 48" stroke="#333" fill="none" stroke-width="2"/><circle cx="30" cy="25" r="5" fill="#FFD700"/></svg>
                        </div>
                        <div class="avatar-option" data-avatar="girl4">
                            <svg viewBox="0 0 100 100"><circle cx="50" cy="40" r="25" fill="#FFE4C4"/><circle cx="50" cy="100" r="40" fill="#FF8C00"/><path d="M22 40 Q20 15 50 15 Q80 15 78 40 Q75 50 70 45 Q50 55 30 45 Q25 50 22 40" fill="#1a1a1a"/><circle cx="42" cy="38" r="3" fill="#333"/><circle cx="58" cy="38" r="3" fill="#333"/><path d="M45 48 Q50 52 55 48" stroke="#333" fill="none" stroke-width="2"/></svg>
                        </div>
                        <div class="avatar-option" data-avatar="girl5">
                            <svg viewBox="0 0 100 100"><circle cx="50" cy="40" r="25" fill="#FFE4C4"/><circle cx="50" cy="100" r="40" fill="#87CEEB"/><path d="M20 30 Q35 10 50 15 Q65 10 80 30 Q85 50 75 55 L70 40 Q50 50 30 40 L25 55 Q15 50 20 30" fill="#D4A574"/><circle cx="20" cy="35" r="6" fill="#FFB6C1"/><circle cx="80" cy="35" r="6" fill="#FFB6C1"/><circle cx="42" cy="38" r="3" fill="#333"/><circle cx="58" cy="38" r="3" fill="#333"/><path d="M45 48 Q50 52 55 48" stroke="#333" fill="none" stroke-width="2"/></svg>
                        </div>
                        <div class="avatar-option" data-avatar="girl6">
                            <svg viewBox="0 0 100 100"><circle cx="50" cy="40" r="25" fill="#FFE4C4"/><circle cx="50" cy="100" r="40" fill="#DDA0DD"/><path d="M25 25 Q50 5 75 25 Q78 45 70 50 Q65 35 50 38 Q35 35 30 50 Q22 45 25 25" fill="#8B4513"/><path d="M30 50 Q25 70 30 75" stroke="#8B4513" stroke-width="6" fill="none"/><path d="M70 50 Q75 70 70 75" stroke="#8B4513" stroke-width="6" fill="none"/><circle cx="42" cy="38" r="3" fill="#333"/><circle cx="58" cy="38" r="3" fill="#333"/><path d="M45 48 Q50 52 55 48" stroke="#333" fill="none" stroke-width="2"/></svg>
                        </div>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button id="confirmAddStudent" class="btn btn-primary">确认</button>
                    <button id="cancelAddStudent" class="btn btn-secondary">取消</button>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <main id="mainContent" style="display:none;">
            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab active" data-tab="record">📝 录入成绩</button>
                <button class="tab" data-tab="history">📋 历史记录</button>
                <button class="tab" data-tab="stats">📊 统计分析</button>
            </div>

            <!-- 录入成绩 -->
            <div id="recordTab" class="tab-content active">
                <form id="scoreForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>考试日期</label>
                            <input type="date" id="examDate" required>
                        </div>
                        <div class="form-group">
                            <label>考试类型</label>
                            <select id="examType" required>
                                <option value="daily">日常测验</option>
                                <option value="weekly">周测</option>
                                <option value="monthly">月考</option>
                                <option value="midterm">期中考试</option>
                                <option value="final">期末考试</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>学期</label>
                            <select id="semester" required>
                                <option value="2025-1">2025年第一学期</option>
                                <option value="2025-2">2025年第二学期</option>
                                <option value="2026-1" selected>2026年第一学期</option>
                                <option value="2026-2">2026年第二学期</option>
                            </select>
                        </div>
                    </div>
                    <div class="scores-input">
                        <div class="score-item">
                            <label>🔤 语文</label>
                            <select id="chineseScore">
                                <option value="">未参加</option>
                                <option value="A+*">A+*</option>
                                <option value="A">A</option>
                                <option value="A-">A-</option>
                                <option value="B+*">B+*</option>
                                <option value="B">B</option>
                                <option value="B-">B-</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                        <div class="score-item">
                            <label>🔢 数学</label>
                            <select id="mathScore">
                                <option value="">未参加</option>
                                <option value="A+*">A+*</option>
                                <option value="A">A</option>
                                <option value="A-">A-</option>
                                <option value="B+*">B+*</option>
                                <option value="B">B</option>
                                <option value="B-">B-</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                        <div class="score-item">
                            <label>🔠 英语</label>
                            <select id="englishScore">
                                <option value="">未参加</option>
                                <option value="A+*">A+*</option>
                                <option value="A">A</option>
                                <option value="A-">A-</option>
                                <option value="B+*">B+*</option>
                                <option value="B">B</option>
                                <option value="B-">B-</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="remarks" placeholder="可选，记录考试情况等"></textarea>
                    </div>

                    <!-- 错题拍照 -->
                    <div class="photo-section">
                        <h4>📷 错题及订正照片</h4>
                        <div class="photo-input-wrapper single">
                            <input type="file" id="photoInput" accept="image/*" capture="environment" multiple>
                            <div class="photo-placeholder" id="photoPreview">
                                <span>点击拍照或选择图片（可多张）</span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-large">保存成绩</button>
                </form>
            </div>

            <!-- 历史记录 -->
            <div id="historyTab" class="tab-content">
                <div class="filter-bar">
                    <select id="filterSemester">
                        <option value="">全部学期</option>
                        <option value="2025-1">2025年第一学期</option>
                        <option value="2025-2">2025年第二学期</option>
                        <option value="2026-1">2026年第一学期</option>
                        <option value="2026-2">2026年第二学期</option>
                    </select>
                    <select id="filterType">
                        <option value="">全部类型</option>
                        <option value="daily">日常测验</option>
                        <option value="weekly">周测</option>
                        <option value="monthly">月考</option>
                        <option value="midterm">期中考试</option>
                        <option value="final">期末考试</option>
                    </select>
                </div>
                <div id="historyList" class="history-list">
                    <p class="empty-message">暂无成绩记录</p>
                </div>
            </div>

            <!-- 统计分析 -->
            <div id="statsTab" class="tab-content">
                <div class="stats-controls">
                    <select id="statsPeriod">
                        <option value="week">按周统计</option>
                        <option value="month">按月统计</option>
                        <option value="semester">按学期统计</option>
                    </select>
                    <select id="statsSemester">
                        <option value="">全部学期</option>
                        <option value="2025-1">2025年第一学期</option>
                        <option value="2025-2">2025年第二学期</option>
                        <option value="2026-1">2026年第一学期</option>
                        <option value="2026-2">2026年第二学期</option>
                    </select>
                </div>
                <div class="stats-summary" id="statsSummary">
                    <div class="stat-card chinese">
                        <h4>🔤 语文</h4>
                        <div class="stat-value" id="chineseMode">--</div>
                        <div class="stat-label">最常见等级</div>
                        <div class="stat-detail" id="chineseDistrib">
                            <span>共 <b>0</b> 次</span>
                        </div>
                    </div>
                    <div class="stat-card math">
                        <h4>🔢 数学</h4>
                        <div class="stat-value" id="mathMode">--</div>
                        <div class="stat-label">最常见等级</div>
                        <div class="stat-detail" id="mathDistrib">
                            <span>共 <b>0</b> 次</span>
                        </div>
                    </div>
                    <div class="stat-card english">
                        <h4>🔠 英语</h4>
                        <div class="stat-value" id="englishMode">--</div>
                        <div class="stat-label">最常见等级</div>
                        <div class="stat-detail" id="englishDistrib">
                            <span>共 <b>0</b> 次</span>
                        </div>
                    </div>
                </div>
                <div class="grade-distribution" id="gradeDistribution"></div>
                <div class="chart-container">
                    <h3>成绩趋势图</h3>
                    <canvas id="trendChart"></canvas>
                </div>
                <div id="periodStats" class="period-stats"></div>
            </div>
        </main>

        <!-- 未选择学生提示 -->
        <div id="noStudentMessage" class="no-student">
            <p>👆 请先选择或添加一个学生</p>
        </div>
    </div>

    <!-- 照片查看模态框 -->
    <div id="photoModal" class="photo-modal">
        <button class="photo-modal-close" onclick="closePhotoModal()">&times;</button>
        <img id="photoModalImg" src="" alt="查看大图">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
